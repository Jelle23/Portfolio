<section class="hero">
  <div class="hero-content">
    <img src="assets/images/profile.png" alt="Your Name" class="hero-image" />
    <div class="hero-text">
      <h1>{{ 'hero.greeting' | translate }}</h1>
      <h2>{{ 'hero.role' | translate }}</h2>
      <p>{{ 'hero.description' | translate }}</p>
      <button (click)="scrollToProjects()">
        {{ 'hero.button' | translate }}
      </button>
    </div>
  </div>
</section>
