<section class="hero">
  <div class="hero-content">
    <img [src]="profileImage" alt="Your Name" class="hero-image" />
    <div class="hero-text">
      <h1>{{ 'hero.greeting' | translate }}</h1>
      <h2>{{ 'hero.role' | translate }}</h2>
      <p>{{ 'hero.description' | translate }}</p>

      <div class="hero-actions">
        <button (click)="scrollToProjects()">
          {{ 'hero.button' | translate }}
        </button>
        <a [href]="linkedinUrl" target="_blank" aria-label="LinkedIn">
          <img [src]="linkedinIcon" alt="LinkedIn" />
        </a>
        <a [href]="githubUrl" target="_blank" aria-label="GitHub">
          <img [src]="githubIcon" alt="GitHub" />
        </a>
        <a [href]="cvUrl" download aria-label="Download CV">
          <img [src]="cvIcon" alt="Download CV" />
        </a>
      </div>
    </div>
  </div>
</section>
