<header class="header">
  <div class="logo">
    <a href="#hero">Jelle Vandebroek</a>
  </div>

  <nav class="nav-links">
    <a href="#hero" [class.active]="activeSection === 'hero'" (click)="scrollToSection($event, 'hero')">{{ 'header.home' | translate }}</a>
    <a href="#about" [class.active]="activeSection === 'about'" (click)="scrollToSection($event, 'about')">{{ 'header.about' | translate }}</a>
    <a href="#experience" [class.active]="activeSection === 'experience'" (click)="scrollToSection($event, 'experience')">{{ 'header.experience' | translate }}</a>
    <a href="#projects" [class.active]="activeSection === 'projects'" (click)="scrollToSection($event, 'projects')">{{ 'header.projects' | translate }}</a>
    <a href="#contact" [class.active]="activeSection === 'contact'" (click)="scrollToSection($event, 'contact')">{{ 'header.contact' | translate }}</a>
  </nav>

  <div class="toggles">
    <!-- Dark Mode Toggle -->
    <button (click)="toggleDarkMode()">
      {{ isDarkMode ? '🌙' : '☀️' }}
    </button>

    <!-- Language Toggle -->
    <div class="language-dropdown">
      <select id="language-select" [value]="currentLang" (change)="onLanguageChange($event)">
        <option *ngFor="let lang of availableLanguages" [value]="lang">
          {{ lang.toUpperCase() }}
        </option>
      </select>
    </div>
  </div>
</header>
